# Конфиг обучения LSTM ETA
# Запуск: python run_train_lstm.py
# С кастомным конфигом: python run_train_lstm.py --config config/train.yaml

trainer:
  max_epochs: 50
  accelerator: auto
  devices: 1
  gradient_clip_val: 1.0

model:
  hidden_size: 64
  num_layers: 2
  lr: 0.001

data:
  batch_size: 32
  val_frac: 0.2
  num_workers: 0

logging:
  name: lstm_eta
  save_dir: logs
  version: null  # авто (timestamp)

checkpoint:
  dirpath: checkpoints
  filename: "eta-{epoch:02d}-{val_rmse_sec:.1f}"
  monitor: val_loss
  mode: min
  save_top_k: 2
  save_last: true

early_stopping:
  enabled: false
  monitor: val_loss
  patience: 10
  mode: min
